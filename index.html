<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
    font-family:Arial;
    overflow:hidden;
}

.container{
    text-align:center;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4081;
    color:white;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button:hover{
    transform:scale(1.1);
}

.card{
    display:none;
    margin-top:30px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4081;
}

.text{
    font-size:20px;
    margin-top:10px;
    color:#444;
}

.flower{
    position:fixed;
    top:-10px;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">

<button onclick="openCard()">💌 Mở thiệp 8/3</button>

<div class="card" id="card">
<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>

<div class="text" id="line1"></div>
<div class="text" id="line2"></div>
<div class="text" id="line3"></div>
<div class="text" id="line4"></div>

</div>

</div>

<<audio id="music" loop>
<source src="co-chac-yeu-la-day.mp3" type="audio/mpeg">
</audio>

<script>

function openCard(){
document.getElementById("card").style.display="block";

document.getElementById("music").play();

setTimeout(()=>{document.getElementById("line1").innerHTML="Chúc cậu một ngày 8/3 thật vui vẻ 🌸";},1000);
setTimeout(()=>{document.getElementById("line2").innerHTML="Luôn xinh đẹp, hạnh phúc và thành công 💖";},3000);
setTimeout(()=>{document.getElementById("line3").innerHTML="lúc nào cũng hạnh phúc ✨";},5000);


}

function createFlower(){
const flower=document.createElement("div");
flower.classList.add("flower");

const flowers=["🌸","🌹","🌺","🌷","💮"];
flower.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(flower);

setTimeout(()=>{flower.remove();},9000);
}

setInterval(createFlower,300);

</script>

</body>
</html>
